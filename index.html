<!DOCTYPE html>
<html lang="id">
<head>
  
    <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dua2nyaKerja</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      background:linear-gradient(160deg,#f5ede4 0%,#edd8c4 50%,#e8c9a8 100%);
      display:flex;align-items:flex-start;justify-content:center;
      padding:2.5rem 1.25rem 4rem;
    }
    .page{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}

    /* Illustration */
    .illus-wrap{
      width:200px;height:200px;border-radius:50%;overflow:hidden;
      border:4px solid rgba(255,255,255,0.6);
      box-shadow:0 8px 32px rgba(180,100,40,0.18);
      margin-bottom:1.25rem;
      background:#f5ede4;
    }
    .illus-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;}

    /* Name & tagline */
    h1{
      font-family:'Playfair Display',serif;
      font-size:26px;font-weight:600;
      color:#3A2010;letter-spacing:-0.3px;
      margin-bottom:0.3rem;text-align:center;
    }
    .at{font-size:15px;color:#7a5030;font-weight:400;}
    .tagline{
      font-size:13px;color:#8a6040;font-weight:300;
      text-align:center;line-height:1.6;margin-bottom:1.75rem;
      font-style:italic;
    }
    .divider{width:36px;height:2px;background:rgba(180,100,40,0.3);border-radius:2px;margin-bottom:1.5rem;}

    /* Link buttons */
    .links{display:flex;flex-direction:column;gap:12px;width:100%;}

    .btn{
      display:flex;align-items:center;gap:14px;
      padding:14px 18px;border-radius:16px;
      background:rgba(255,255,255,0.65);
      border:1px solid rgba(255,255,255,0.8);
      backdrop-filter:blur(8px);
      cursor:pointer;text-decoration:none;
      transition:transform 0.15s,box-shadow 0.15s,background 0.15s;
      width:100%;
    }
    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(180,100,40,0.15);
      background:rgba(255,255,255,0.82);
    }
    .btn:active{transform:translateY(0);}

    .icon-wrap{
      width:40px;height:40px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      font-size:20px;
    }
    .btn-text{flex:1;}
    .btn-title{font-size:14px;font-weight:500;color:#2a1a08;display:block;margin-bottom:2px;}
    .btn-sub{font-size:11px;color:#9a7050;font-weight:300;display:block;}
    .arrow{font-size:16px;color:#c8905a;}

    /* Accordion child links */
    .accordion-body{
      display:none;flex-direction:column;gap:8px;
      padding:10px 14px 4px;width:100%;
    }
    .accordion-body.open{display:flex;}
    .child-link{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:10px;
      background:rgba(255,255,255,0.5);
      border:1px solid rgba(255,255,255,0.7);
      text-decoration:none;color:#3a2010;font-size:13px;font-weight:400;
      transition:background 0.15s;
    }
    .child-link:hover{background:rgba(255,255,255,0.75);}
    .child-dot{width:6px;height:6px;border-radius:50%;background:#c8905a;flex-shrink:0;}

    /* Social icons row */
    .socials{display:flex;gap:16px;margin-top:2rem;}
    .soc-btn{
      width:44px;height:44px;border-radius:50%;
      background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.8);
      display:flex;align-items:center;justify-content:center;
      text-decoration:none;transition:transform 0.15s,background 0.15s;
    }
    .soc-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.85);}
    .soc-btn svg{width:20px;height:20px;}

    .footer{margin-top:2rem;font-size:11px;color:#b08060;font-weight:300;font-style:italic;}
  </style>
</head>
